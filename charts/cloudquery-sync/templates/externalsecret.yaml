{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "cloudquery-sync.fullname" . }}-destination
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cloudquery-sync.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecret.secretStoreRef.name is required when externalSecret.enabled=true" .Values.externalSecret.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ default (printf "%s-destination-credentials" (include "cloudquery-sync.fullname" .)) .Values.externalSecret.targetSecretName | quote }}
    creationPolicy: Owner
  {{- if .Values.externalSecret.data }}
  data:
    {{- toYaml .Values.externalSecret.data | nindent 4 }}
  {{- end }}
  {{- if .Values.externalSecret.dataFrom }}
  dataFrom:
    {{- toYaml .Values.externalSecret.dataFrom | nindent 4 }}
  {{- end }}
{{- end }}
