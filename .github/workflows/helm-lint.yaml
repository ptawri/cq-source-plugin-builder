name: Helm Lint and Template

on:
  push:
    branches: ["main"]
    paths:
      - "charts/**"
      - "examples/**"
      - ".github/workflows/helm-lint.yaml"
  pull_request:
    paths:
      - "charts/**"
      - "examples/**"
      - ".github/workflows/helm-lint.yaml"

jobs:
  lint-and-template:
    name: Lint and Template
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.4"

      - name: Helm lint (default values)
        run: helm lint charts/cloudquery-sync

      - name: Helm template – CronJob mode (default)
        run: |
          helm template test charts/cloudquery-sync \
            --set destination.path=cloudquery/postgresql \
            --set destination.version=v8.0.0 \
            --set "destination.spec.connection_string=postgresql://localhost/test" \
            > /tmp/rendered-cronjob.yaml
          echo "--- Rendered CronJob manifest ---"
          cat /tmp/rendered-cronjob.yaml

      - name: Verify CronJob is rendered in default mode
        run: grep -q "kind: CronJob" /tmp/rendered-cronjob.yaml

      - name: Helm template – Deployment mode
        run: |
          helm template test charts/cloudquery-sync \
            --set mode=deployment \
            --set destination.path=cloudquery/postgresql \
            --set destination.version=v8.0.0 \
            --set "destination.spec.connection_string=postgresql://localhost/test" \
            > /tmp/rendered-deployment.yaml
          echo "--- Rendered Deployment manifest ---"
          cat /tmp/rendered-deployment.yaml

      - name: Verify Deployment is rendered in deployment mode
        run: grep -q "kind: Deployment" /tmp/rendered-deployment.yaml

      - name: Helm template – ExternalSecret enabled
        run: |
          helm template test charts/cloudquery-sync \
            --set externalSecret.enabled=true \
            --set externalSecret.secretStoreRef.name=my-vault-store \
            --set destination.path=cloudquery/postgresql \
            --set destination.version=v8.0.0 \
            --set "destination.spec.connection_string=postgresql://localhost/test" \
            > /tmp/rendered-eso.yaml
          grep -q "kind: ExternalSecret" /tmp/rendered-eso.yaml

      - name: Helm template – ExternalSecret NOT rendered when disabled
        run: |
          helm template test charts/cloudquery-sync \
            --set externalSecret.enabled=false \
            --set destination.path=cloudquery/postgresql \
            --set destination.version=v8.0.0 \
            --set "destination.spec.connection_string=postgresql://localhost/test" \
            > /tmp/rendered-no-eso.yaml
          ! grep -q "kind: ExternalSecret" /tmp/rendered-no-eso.yaml

      - name: Helm template – ExistingSecret destination
        run: |
          helm template test charts/cloudquery-sync \
            --set destination.existingSecret.name=my-pg-secret \
            > /tmp/rendered-existing-secret.yaml
          grep -q "my-pg-secret" /tmp/rendered-existing-secret.yaml

      - name: Helm template – with AKS example values
        run: |
          helm template test charts/cloudquery-sync \
            -f examples/values-aks.yaml \
            > /tmp/rendered-aks.yaml

      - name: Helm template – with GKE example values
        run: |
          helm template test charts/cloudquery-sync \
            -f examples/values-gke.yaml \
            > /tmp/rendered-gke.yaml
